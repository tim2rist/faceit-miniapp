<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FACEIT Finder AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background: radial-gradient(circle at top right, #2d1b10, #111111);
            color: #eee;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .faceit-orange {
            color: #ff5500;
        }

        .faceit-bg-orange {
            background-color: #ff5500;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .loading {
            animation: pulse 1.5s infinite;
        }
    </style>
</head>

<body class="min-h-screen p-4 flex flex-col items-center">

    <div class="w-full max-w-md flex justify-between items-center mb-8 mt-2">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 faceit-bg-orange rounded-xl flex items-center justify-center shadow-lg">
                <i data-lucide="crosshair" class="text-white w-6 h-6"></i>
            </div>
            <h1 class="text-xl font-bold">FACEIT <span class="faceit-orange">AI</span></h1>
        </div>
        <img id="my-avatar" class="w-10 h-10 rounded-full border border-gray-700"
            src="https://ui-avatars.com/api/?name=U">
    </div>

    <div id="main-card" class="w-full max-w-md glass-card rounded-3xl p-6 mb-6 relative">
        <div class="flex items-center gap-4 mb-6">
            <div class="w-20 h-20 rounded-2xl bg-gray-800 overflow-hidden border border-orange-500/30">
                <img id="p-avatar" src="" class="w-full h-full object-cover">
            </div>
            <div>
                <h2 id="p-name" class="text-2xl font-black italic uppercase italic tracking-tighter">Загрузка...</h2>
                <div class="flex items-center gap-2 text-gray-400 text-sm">
                    <span id="p-elo" class="faceit-orange font-bold">--- ELO</span>
                    <span>•</span>
                    <span id="p-lvl">LVL -</span>
                </div>
            </div>
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div class="bg-white/5 p-3 rounded-2xl text-center">
                <p class="text-[10px] text-gray-500 uppercase">Country</p>
                <p id="p-country" class="font-bold">-</p>
            </div>
            <div class="bg-white/5 p-3 rounded-2xl text-center">
                <p class="text-[10px] text-gray-500 uppercase">ID</p>
                <p id="p-id" class="font-mono text-[10px] truncate">---</p>
            </div>
        </div>
    </div>

    <div class="w-full max-w-md glass-card rounded-3xl p-6 mb-6">
        <div class="flex items-center gap-2 mb-2 text-orange-400">
            <i data-lucide="cpu" class="w-4 h-4"></i>
            <h3 class="font-bold uppercase text-xs">AI Инсайт</h3>
        </div>
        <p id="ai-text" class="text-gray-400 text-sm leading-relaxed">Собираю данные об игроке для анализа...</p>
    </div>

    <button onclick="tg.close()"
        class="w-full max-w-md faceit-bg-orange text-white font-black py-4 rounded-2xl uppercase tracking-widest text-sm active:scale-95 transition-all">
        Закрыть
    </button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        lucide.createIcons();

        const FACEIT_KEY = "a83d1a7f-f3cf-4df2-949e-ad5d650a7d45"; // Обязательно вставь свой ключ!
        const urlParams = new URLSearchParams(window.location.search);
        const playerId = urlParams.get('id');

        if (tg.initDataUnsafe?.user?.photo_url) {
            document.getElementById('my-avatar').src = tg.initDataUnsafe.user.photo_url;
        }

        async function fetchPlayer() {
            if (!playerId) return;
            try {
                const res = await fetch(`https://open.faceit.com/data/v4/players/${playerId}`, {
                    headers: { 'Authorization': `Bearer ${FACEIT_KEY}` }
                });
                const d = await res.json();

                document.getElementById('p-name').innerText = d.nickname;
                document.getElementById('p-avatar').src = d.avatar || 'https://avatar.faceit.com/default_avatar.png';
                document.getElementById('p-elo').innerText = (d.games?.cs2?.faceit_elo || d.games?.csgo?.faceit_elo || '0') + ' ELO';
                document.getElementById('p-lvl').innerText = 'LVL ' + (d.games?.cs2?.skill_level || d.games?.csgo?.skill_level || '-');
                document.getElementById('p-country').innerText = d.country ? d.country.toUpperCase() : 'Global';
                document.getElementById('p-id').innerText = d.player_id;
                document.getElementById('ai-text').innerText = `Игрок ${d.nickname} найден. Его текущий уровень: ${d.games?.cs2?.skill_level || 'неизвестен'}. ИИ рекомендует проанализировать последние матчи для точного прогноза.`;
            } catch (e) {
                document.getElementById('p-name').innerText = "Ошибка API";
            }
        }
        fetchPlayer();
    </script>
</body>

</html>
