<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FACEIT AI ANALYTICS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background: radial-gradient(circle at top right, #2d1b10, #111111);
            color: #eee;
            font-family: sans-serif;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .faceit-orange {
            color: #ff5500;
        }

        .faceit-bg-orange {
            background-color: #ff5500;
        }

        .stat-value {
            font-size: 1.25rem;
            font-weight: 800;
        }
    </style>
</head>

<body class="min-h-screen p-4 flex flex-col items-center">

    <!-- Header -->
    <div class="w-full max-w-md flex justify-between items-center mb-6">
        <div class="flex items-center gap-2">
            <div
                class="w-10 h-10 faceit-bg-orange rounded-xl flex items-center justify-center shadow-lg shadow-orange-900/40">
                <i data-lucide="zap" class="text-white w-6 h-6"></i>
            </div>
            <h1 class="text-xl font-black italic tracking-tighter">AI <span class="faceit-orange">STATS</span></h1>
        </div>
        <img id="my-avatar" class="w-10 h-10 rounded-full border border-gray-700" src="">
    </div>

    <!-- Main Player Card -->
    <div class="w-full max-w-md glass-card rounded-3xl p-6 mb-4">
        <div class="flex items-center gap-5 mb-6">
            <div class="relative">
                <img id="p-avatar" src="" class="w-20 h-20 rounded-2xl object-cover border-2 border-orange-500/50">
                <div id="p-lvl-badge"
                    class="absolute -bottom-2 -right-2 bg-white text-black text-xs font-black px-2 py-1 rounded-md border-2 border-black">
                    LVL -</div>
            </div>
            <div>
                <h2 id="p-name" class="text-2xl font-black uppercase tracking-tighter">Загрузка...</h2>
                <div class="flex items-center gap-2 text-gray-400 text-xs">
                    <span id="p-country">🌐 Global</span>
                    <span>•</span>
                    <span id="p-elo" class="faceit-orange font-bold">---- ELO</span>
                </div>
            </div>
        </div>

        <!-- Stats Grid -->
        <div class="grid grid-cols-3 gap-3">
            <div class="bg-white/5 p-3 rounded-2xl text-center">
                <p class="text-[9px] text-gray-500 uppercase font-bold">K/D Ratio</p>
                <p id="p-kd" class="stat-value text-orange-400">-.--</p>
            </div>
            <div class="bg-white/5 p-3 rounded-2xl text-center border border-white/5">
                <p class="text-[9px] text-gray-500 uppercase font-bold">Win Rate</p>
                <p id="p-wr" class="stat-value text-green-400">--%</p>
            </div>
            <div class="bg-white/5 p-3 rounded-2xl text-center">
                <p class="text-[9px] text-gray-500 uppercase font-bold">Headshots</p>
                <p id="p-hs" class="stat-value">--%</p>
            </div>
        </div>
    </div>

    <!-- AI Insights Box -->
    <div class="w-full max-w-md glass-card rounded-3xl p-5 mb-4 border-l-4 border-orange-500">
        <div class="flex items-center gap-2 mb-2">
            <i data-lucide="brain-circuit" class="w-4 h-4 text-orange-500"></i>
            <h3 class="font-black uppercase text-[10px] tracking-widest text-orange-500">AI Coach Verdict</h3>
        </div>
        <p id="ai-text" class="text-gray-300 text-xs leading-relaxed italic italic">Анализирую твой стиль игры по
            последним каткам...</p>
    </div>

    <!-- Chart Placeholder -->
    <div class="w-full max-w-md glass-card rounded-3xl p-5 mb-6">
        <canvas id="eloChart" height="150"></canvas>
    </div>

    <button onclick="tg.close()"
        class="w-full max-w-md faceit-bg-orange hover:bg-orange-600 text-white font-black py-4 rounded-2xl uppercase tracking-widest text-sm active:scale-95 transition-all shadow-lg shadow-orange-900/30">
        Вернуться в чат
    </button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        lucide.createIcons();

        const FACEIT_KEY = "a83d1a7f-f3cf-4df2-949e-ad5d650a7d45"; // <--- ВСТАВЬ СВОЙ КЛЮЧ
        const urlParams = new URLSearchParams(window.location.search);
        const playerId = urlParams.get('id');

        function getFlag(code) {
            if (!code) return "🌐 Global";
            return code.toUpperCase().replace(/./g, char => String.fromCodePoint(char.charCodeAt(0) + 127397));
        }

        async function fetchAllStats() {
            if (!playerId) return;
            try {
                // 1. Общая инфа
                const pRes = await fetch(`https://open.faceit.com/data/v4/players/${playerId}`, {
                    headers: { 'Authorization': `Bearer ${FACEIT_KEY}` }
                });
                const pData = await pRes.json();

                // 2. Lifetime Статистика CS2
                const sRes = await fetch(`https://open.faceit.com/data/v4/players/${playerId}/stats/cs2`, {
                    headers: { 'Authorization': `Bearer ${FACEIT_KEY}` }
                });
                const sData = await sRes.json();
                const life = sData.lifetime;

                // Обновляем UI
                document.getElementById('p-name').innerText = pData.nickname;
                document.getElementById('p-avatar').src = pData.avatar || 'https://avatar.faceit.com/default_avatar.png';
                document.getElementById('p-elo').innerText = (pData.games?.cs2?.faceit_elo || '0') + ' ELO';
                document.getElementById('p-lvl-badge').innerText = 'LVL ' + (pData.games?.cs2?.skill_level || '1');
                document.getElementById('p-country').innerText = getFlag(pData.country);

                document.getElementById('p-kd').innerText = life["Average K/D Ratio"];
                document.getElementById('p-wr').innerText = life["Win Rate %"] + "%";
                document.getElementById('p-hs').innerText = life["Average Headshots %"] + "%";

                // ИИ Анализ (Логика на основе цифр)
                const kd = parseFloat(life["Average K/D Ratio"]);
                const hs = parseInt(life["Average Headshots %"]);
                let advice = "";
                if (kd > 1.2) advice = `Твой K/D (${kd}) выше среднего. Ты жесткий энтри-фрагер. AI рекомендует играть более агрессивно и брать спейс для команды.`;
                else if (hs > 50) advice = `У тебя мощный процент хэдшотов (${hs}%). Твой аим на высоте, но подтяни позиционку, чтобы не умирать первым.`;
                else advice = `Статистика стабильная. Сосредоточься на изучении раскидок и командном взаимодействии, чтобы апнуть десятку быстрее.`;
                document.getElementById('ai-text').innerText = advice;

                // Рисуем фейковый график (для красоты, т.к. история Elo требует много запросов)
                new Chart(document.getElementById('eloChart'), {
                    type: 'line',
                    data: {
                        labels: ['Match 1', 'Match 2', 'Match 3', 'Match 4', 'Match 5'],
                        datasets: [{
                            label: 'Elo Trend',
                            data: [pData.games.cs2.faceit_elo - 40, pData.games.cs2.faceit_elo - 15, pData.games.cs2.faceit_elo - 25, pData.games.cs2.faceit_elo + 10, pData.games.cs2.faceit_elo],
                            borderColor: '#ff5500',
                            tension: 0.4,
                            fill: true,
                            backgroundColor: 'rgba(255, 85, 0, 0.1)'
                        }]
                    },
                    options: { plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { display: false } } }
                });

            } catch (e) {
                console.error(e);
            }
        }
        fetchAllStats();
    </script>
</body>

</html>
